name: Build and Release

on:
    push:
        branches:
            - main

jobs:
    release:
        permissions:
            contents: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: "macos-latest"
                      args: "--target aarch64-apple-darwin"
                      target: "aarch64-apple-darwin"
                      name: "macOS Apple Silicon"
                    - platform: "macos-latest"
                      args: "--target x86_64-apple-darwin"
                      target: "x86_64-apple-darwin"
                      name: "macOS Intel"
                    - platform: "ubuntu-22.04"
                      args: ""
                      target: ""
                      name: "Linux"
                    - platform: "windows-latest"
                      args: ""
                      target: ""
                      name: "Windows"

        runs-on: ${{ matrix.platform }}
        name: Build ${{ matrix.name }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm"

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  # This installs the specific cross-compilation target if defined in the matrix
                  targets: ${{ matrix.target || '' }}

            - name: Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"

            - name: Install Linux dependencies
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

            - name: Install frontend dependencies
              run: pnpm install

            - name: Build the app and create release
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: v__VERSION__
                  releaseName: "Context Studio v__VERSION__"
                  releaseBody: "Automated release triggered by push to main."
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}
